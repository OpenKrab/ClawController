<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
    <!-- Base Gradient -->
    <defs>
        <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
            <stop offset="0%" stop-color="#ff7f50"/>
            <stop offset="100%" stop-color="#ff4500"/>
        </radialGradient>
        <linearGradient id="clawGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="100%" stop-color="#ffebbb"/>
        </linearGradient>
    </defs>
    
    <!-- Outer Shield / Container -->
    <circle cx="50" cy="50" r="45" fill="url(#bgGlow)" stroke="#900" stroke-width="2"/>
    
    <!-- Stylized Lobster Claw Logo -->
    <path d="M 65 30 
             C 80 20, 90 40, 75 60 
             C 65 70, 50 85, 30 75
             C 10 65, 15 45, 30 40
             C 45 35, 50 45, 60 50
             C 70 55, 60 40, 50 35
             Z" 
          fill="url(#clawGradient)" 
          stroke="#400" 
          stroke-width="2" 
          stroke-linejoin="round"/>
          
    <path d="M 30 75 
             C 15 85, 20 95, 35 90
             C 45 85, 50 78, 48 70
             Z" 
          fill="#ff4500" 
          stroke="#fff" 
          stroke-width="1.5"/>

    <!-- Dynamic Spark -->
    <path d="M 60 20 L 68 32 L 80 30 L 70 40 L 75 52 L 62 45 Z" fill="#ffd700" />
</svg>
